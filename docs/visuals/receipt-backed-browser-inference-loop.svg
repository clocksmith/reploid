<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="700" viewBox="0 0 1120 700" role="img" aria-labelledby="title desc">
  <title id="title">Receipt-backed browser inference loop</title>
  <desc id="desc">Flow diagram showing requester to coordinator to provider browser to Doppler runtime, then signed receipt verification, requester acceptance, and trust tiers T1 through T3.</desc>
  <defs>
    <style>
text { fill: #f2f2f0; font-family: Inter, Segoe UI, Helvetica Neue, Arial, sans-serif; letter-spacing: 0; }
    .ev-title { font-family: Inter, Segoe UI, Helvetica Neue, Arial, sans-serif; font-size: 30px; font-weight: 700; }
    .ev-subtitle { font-size: 15px; fill: #9ca3af; font-weight: 500; }
    .ev-node-title { font-size: 17px; font-weight: 700; }
    .ev-node-meta { font-size: 12px; fill: #9ca3af; font-family: SFMono-Regular, Menlo, Consolas, Liberation Mono, monospace; }
    .ev-label { font-size: 12px; fill: #9ca3af; font-weight: 600; }
    .ev-mono { font-family: SFMono-Regular, Menlo, Consolas, Liberation Mono, monospace; }
    .ev-small { font-size: 11px; }
    </style>
    <marker id="ev-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#93c5fd" />
    </marker>
    <marker id="ev-arrow-muted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#9ca3af" />
    </marker>

  </defs>
  <rect x="0" y="0" width="1120" height="700" fill="#050607" />
<text x="52" y="58" text-anchor="start" class="ev-title" style="">Receipt-backed browser inference loop</text>
<text x="52" y="86" text-anchor="start" class="ev-subtitle" style="">A requester gets output plus a verifier-readable execution receipt.</text>
<text x="52" y="106" text-anchor="start" class="ev-subtitle" style="">The browser provider is useful but untrusted; policy, signatures, hashes, and acceptance create the evidence trail.</text>
<line x1="240" y1="219" x2="310" y2="219" stroke="#93c5fd" stroke-width="1.75" marker-end="url(#ev-arrow)" />
<text x="275" y="211" text-anchor="middle" class="ev-label" style="">job + policy</text>
<line x1="500" y1="219" x2="570" y2="219" stroke="#93c5fd" stroke-width="1.75" marker-end="url(#ev-arrow)" />
<text x="535" y="211" text-anchor="middle" class="ev-label" style="">assignment</text>
<line x1="775" y1="219" x2="850" y2="219" stroke="#93c5fd" stroke-width="1.75" marker-end="url(#ev-arrow)" />
<text x="812.5" y="211" text-anchor="middle" class="ev-label" style="">prompt</text>
<line x1="955" y1="268" x2="672.5" y2="380" stroke="#93c5fd" stroke-width="1.75" marker-end="url(#ev-arrow)" />
<text x="853.75" y="316" text-anchor="middle" class="ev-label" style="">output</text>
<line x1="672.5" y1="268" x2="672.5" y2="380" stroke="#86efac" stroke-width="1.75" marker-end="url(#ev-arrow)" />
<text x="618.5" y="316" text-anchor="middle" class="ev-label" style="">signature</text>
<line x1="405" y1="268" x2="405" y2="384" stroke="#9ca3af" stroke-width="1.75" stroke-dasharray="6 6" marker-end="url(#ev-arrow-muted)" />
<text x="405" y="318" text-anchor="middle" class="ev-label" style="">assignment record</text>
<line x1="570" y1="433" x2="500" y2="433" stroke="#9ca3af" stroke-width="1.75" stroke-dasharray="6 6" marker-end="url(#ev-arrow-muted)" />
<text x="535" y="425" text-anchor="middle" class="ev-label" style="">verify receipt</text>
<line x1="310" y1="433" x2="240" y2="433" stroke="#9ca3af" stroke-width="1.75" stroke-dasharray="6 6" marker-end="url(#ev-arrow-muted)" />
<text x="275" y="425" text-anchor="middle" class="ev-label" style="">accept/reject</text>
<line x1="150" y1="384" x2="150" y2="268" stroke="#86efac" stroke-width="1.75" marker-end="url(#ev-arrow)" />
<text x="88" y="330" text-anchor="middle" class="ev-label" style="">accepted result</text>
<g><rect x="60" y="170" width="180" height="98" rx="4" class="" fill="#101317" stroke="#93c5fd" stroke-width="1.25" />
<text x="76" y="199" text-anchor="start" class="ev-node-title" style="">Requester</text>
<text x="76" y="222" text-anchor="start" class="ev-node-meta" style="">/run prompt + policy</text>
<g>
  <rect x="76" y="234" width="72" height="24" rx="3" fill="#93c5fd" fill-opacity="0.14" stroke="#93c5fd" stroke-width="1.25" />
  <text x="86" y="250" class="ev-label" fill="#93c5fd" style="fill:#93c5fd;font-family:SFMono-Regular, Menlo, Consolas, Liberation Mono, monospace">job</text>
</g></g>
<g><rect x="310" y="170" width="190" height="98" rx="4" class="" fill="#101317" stroke="#93c5fd" stroke-width="1.25" />
<text x="326" y="199" text-anchor="start" class="ev-node-title" style="">Coordinator</text>
<text x="326" y="222" text-anchor="start" class="ev-node-meta" style="">assign + notary</text>
<g>
  <rect x="326" y="234" width="72" height="24" rx="3" fill="#93c5fd" fill-opacity="0.14" stroke="#93c5fd" stroke-width="1.25" />
  <text x="336" y="250" class="ev-label" fill="#93c5fd" style="fill:#93c5fd;font-family:SFMono-Regular, Menlo, Consolas, Liberation Mono, monospace">policy</text>
</g></g>
<g><rect x="570" y="170" width="205" height="98" rx="4" class="" fill="#101317" stroke="#93c5fd" stroke-width="1.25" />
<text x="586" y="199" text-anchor="start" class="ev-node-title" style="">Provider Browser</text>
<text x="586" y="222" text-anchor="start" class="ev-node-meta" style="">/contribute tab</text>
<g>
  <rect x="586" y="234" width="76.8" height="24" rx="3" fill="#93c5fd" fill-opacity="0.14" stroke="#93c5fd" stroke-width="1.25" />
  <text x="596" y="250" class="ev-label" fill="#93c5fd" style="fill:#93c5fd;font-family:SFMono-Regular, Menlo, Consolas, Liberation Mono, monospace">identity</text>
</g></g>
<g><rect x="850" y="170" width="210" height="98" rx="4" class="" fill="#101317" stroke="#93c5fd" stroke-width="1.25" />
<text x="866" y="199" text-anchor="start" class="ev-node-title" style="">Doppler Runtime</text>
<text x="866" y="222" text-anchor="start" class="ev-node-meta" style="">WebGPU model run</text>
<g>
  <rect x="866" y="234" width="91" height="24" rx="3" fill="#93c5fd" fill-opacity="0.14" stroke="#93c5fd" stroke-width="1.25" />
  <text x="876" y="250" class="ev-label" fill="#93c5fd" style="fill:#93c5fd;font-family:SFMono-Regular, Menlo, Consolas, Liberation Mono, monospace">model hash</text>
</g></g>
<g><rect x="570" y="380" width="205" height="106" rx="4" class="" fill="#101317" stroke="#86efac" stroke-width="1.25" />
<text x="586" y="409" text-anchor="start" class="ev-node-title" style="">Signed Receipt</text>
<text x="586" y="432" text-anchor="start" class="ev-node-meta" style="">output + token hashes</text>
<g>
  <rect x="586" y="452" width="105.19999999999999" height="24" rx="3" fill="#86efac" fill-opacity="0.14" stroke="#86efac" stroke-width="1.25" />
  <text x="596" y="468" class="ev-label" fill="#86efac" style="fill:#86efac;font-family:SFMono-Regular, Menlo, Consolas, Liberation Mono, monospace">provider sig</text>
</g></g>
<g><rect x="310" y="384" width="190" height="98" rx="4" class="" fill="#101317" stroke="#fde68a" stroke-width="1.25" />
<text x="326" y="413" text-anchor="start" class="ev-node-title" style="">Verifier</text>
<text x="326" y="436" text-anchor="start" class="ev-node-meta" style="">hash + policy checks</text>
<g>
  <rect x="326" y="448" width="76.8" height="24" rx="3" fill="#fde68a" fill-opacity="0.14" stroke="#fde68a" stroke-width="1.25" />
  <text x="336" y="464" class="ev-label" fill="#fde68a" style="fill:#fde68a;font-family:SFMono-Regular, Menlo, Consolas, Liberation Mono, monospace">decision</text>
</g></g>
<g><rect x="60" y="384" width="180" height="98" rx="4" class="" fill="#101317" stroke="#86efac" stroke-width="1.25" />
<text x="76" y="413" text-anchor="start" class="ev-node-title" style="">Acceptance</text>
<text x="76" y="436" text-anchor="start" class="ev-node-meta" style="">requester countersign</text>
<g>
  <rect x="76" y="448" width="105.19999999999999" height="24" rx="3" fill="#86efac" fill-opacity="0.14" stroke="#86efac" stroke-width="1.25" />
  <text x="86" y="464" class="ev-label" fill="#86efac" style="fill:#86efac;font-family:SFMono-Regular, Menlo, Consolas, Liberation Mono, monospace">points event</text>
</g></g>
<g><rect x="60" y="570" width="1000" height="74" rx="4" class="" fill="#0b0d0f" stroke="#2a2f35" stroke-width="1.25" />
<text x="76" y="594" text-anchor="start" class="ev-label" style="">Trust roadmap</text>
<g>
  <rect x="76" y="608" width="314.6666666666667" height="24" rx="3" fill="#93c5fd" fill-opacity="0.14" stroke="#93c5fd" stroke-width="1.25" />
  <text x="86" y="624" class="ev-label" fill="#93c5fd" style="fill:#93c5fd;font-family:SFMono-Regular, Menlo, Consolas, Liberation Mono, monospace">T1: signed receipt</text>
</g>
<g>
  <rect x="402.6666666666667" y="608" width="314.6666666666667" height="24" rx="3" fill="#fde68a" fill-opacity="0.14" stroke="#fde68a" stroke-width="1.25" />
  <text x="412.6666666666667" y="624" class="ev-label" fill="#fde68a" style="fill:#fde68a;font-family:SFMono-Regular, Menlo, Consolas, Liberation Mono, monospace">T2: canary audited</text>
</g>
<g>
  <rect x="729.3333333333334" y="608" width="314.6666666666667" height="24" rx="3" fill="#86efac" fill-opacity="0.14" stroke="#86efac" stroke-width="1.25" />
  <text x="739.3333333333334" y="624" class="ev-label" fill="#86efac" style="fill:#86efac;font-family:SFMono-Regular, Menlo, Consolas, Liberation Mono, monospace">T3: redundant agreement</text>
</g></g>
</svg>
