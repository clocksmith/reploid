<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes"
    />
    <base id="reploid-base" href="/" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <title>Reploid</title>
    <script>
    window.REPLOID_BUILD_VERSION = '2026070314';
      window.REPLOID_SW_VERSION = window.REPLOID_BUILD_VERSION;
      window.REPLOID_VFS_VERSION = window.REPLOID_BUILD_VERSION;
    </script>
    <link rel="stylesheet" href="/styles/rd.css" />
    <link rel="stylesheet" href="/styles/boot.css" />
  </head>
  <body>
    <div id="wizard-container" class="wizard-container" style="display: none"></div>
    <div id="app"></div>
    <script
      type="module"
    >
      const pathname = (window.location.pathname || '/').replace(/\/+$/, '') || '/';
      const productPaths = new Set([
        '/',
        '/compute',
        '/ask',
        '/history',
        '/network'
      ]);
      const productRoute = productPaths.has(pathname);
      const ROOT_SW_RELEASE_RELOAD_KEY = 'REPLOID_ROOT_SW_RELEASE_RELOAD';
      const releaseGlobalReploidServiceWorker = async () => {
        if (!('serviceWorker' in navigator)) return false;
        try {
          const registrations = await navigator.serviceWorker.getRegistrations?.();
          const rootRegistrations = (registrations || []).filter((registration) => {
            const scopeUrl = new URL(registration.scope);
            return scopeUrl.origin === window.location.origin && scopeUrl.pathname === '/';
          });
          if (rootRegistrations.length === 0) {
            sessionStorage.removeItem(ROOT_SW_RELEASE_RELOAD_KEY);
            return false;
          }
          const controlsCurrentPage = !!navigator.serviceWorker.controller;
          await Promise.all(rootRegistrations.map((registration) => registration.unregister()));
          if (controlsCurrentPage && sessionStorage.getItem(ROOT_SW_RELEASE_RELOAD_KEY) !== 'true') {
            sessionStorage.setItem(ROOT_SW_RELEASE_RELOAD_KEY, 'true');
            window.location.reload();
            return new Promise(() => {});
          }
          sessionStorage.removeItem(ROOT_SW_RELEASE_RELOAD_KEY);
          return true;
        } catch {
          return false;
        }
      };
      if (productRoute) {
        document.title = 'Reploid';
      } else if (pathname === '/zero') {
        document.title = 'Zero';
      } else if (pathname === '/x') {
        document.title = 'X';
      } else {
        document.title = 'Reploid';
      }
      if (productRoute) {
        await releaseGlobalReploidServiceWorker();
        const appRoot = document.getElementById('app');
        if (!appRoot) {
          throw new Error('Missing app root');
        }
        import('/ui/pool-home/index.js').then(({ initPoolHome }) => {
          initPoolHome(appRoot);
        }).catch((error) => {
          throw error;
        });
      } else {
        const bootPath = `/kernel/boot.js?v=${window.REPLOID_BUILD_VERSION}`;
        await import(bootPath);
      }
    </script>
  </body>
</html>
